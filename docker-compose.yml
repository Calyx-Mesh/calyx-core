# INGRVM Local Mesh Simulation (Austin Genesis)
# Spawning 3-5 nodes to test Spike Protocol and Sharding logic.

services:
  INGRVM_seed:
    build: .
    image: INGRVM-node:latest
    container_name: INGRVM_seed
    ports:
      - "8000:8000"
      - "60001:60001"
    environment:
      - INGRVM_ROLE=SEED
    volumes:
      - .:/app

  INGRVM_node_01:
    image: INGRVM-node:latest
    container_name: INGRVM_node_01
    depends_on:
      - INGRVM_seed
    environment:
      - INGRVM_ROLE=NEURON
      - BOOTSTRAP_ADDR=INGRVM_seed
    volumes:
      - .:/app

  INGRVM_node_02:
    image: INGRVM-node:latest
    container_name: INGRVM_node_02
    depends_on:
      - INGRVM_seed
    environment:
      - INGRVM_ROLE=NEURON
      - BOOTSTRAP_ADDR=INGRVM_seed
    volumes:
      - .:/app

# Network configuration for libp2p and local discovery
networks:
  default:
    driver: bridge

