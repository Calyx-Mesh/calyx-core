
version: '3.8'
services:
  INGRVM-lighthouse:
    image: INGRVM-mesh/lighthouse:latest
    ports:
      - "60000:60000"
      - "8000:8000"
    environment:
      - INGRVM_NODE_ROLE=LIGHTHOUSE
      - INGRVM_P2P_PORT=60000
    volumes:
      - ./lighthouse_env:/app/neuromorphic_env
    restart: always

